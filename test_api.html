
<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00e5c3; padding: 20px; }
        button { background: #7c5cfc; color: white; padding: 10px 20px; margin: 10px; border: none; cursor: pointer; }
        pre { background: #1a1a1a; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: #00e5c3; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <h1>🧠 MindGuard API Test</h1>
    
    <button onclick="testHealth()">Test Health</button>
    <button onclick="testPredict()">Test Predict</button>
    <button onclick="testGuidance()">Test Guidance</button>
    <button onclick="testAll()">Test All</button>
    
    <h3>Results:</h3>
    <pre id="output">Click a button to test...</pre>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        
        async function testHealth() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing health endpoint...\n';
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                output.innerHTML += `✅ Health Check: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.innerHTML += `❌ Error: ${error.message}`;
            }
        }
        
        async function testPredict() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing prediction endpoint...\n';
            try {
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sleep_hours: 7,
                        workload_hours: 8,
                        stress_level: 5,
                        screen_time: 6,
                        physical_activity: 30,
                        social_interaction: 2,
                        meal_quality: 7,
                        productivity_score: 7
                    })
                });
                const data = await response.json();
                output.innerHTML += `✅ Prediction: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.innerHTML += `❌ Error: ${error.message}`;
            }
        }
        
        async function testGuidance() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing guidance endpoint...\n';
            try {
                const response = await fetch(`${API_BASE_URL}/guidance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: "How to reduce stress?",
                        context: { risk_level: "High" }
                    })
                });
                const data = await response.json();
                output.innerHTML += `✅ Guidance: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.innerHTML += `❌ Error: ${error.message}`;
            }
        }
        
        async function testAll() {
            await testHealth();
            await new Promise(r => setTimeout(r, 500));
            await testPredict();
            await new Promise(r => setTimeout(r, 500));
            await testGuidance();
        }
    </script>
</body>
</html>
